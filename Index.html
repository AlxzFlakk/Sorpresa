<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti 🎁</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .card { background: white; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; }
        h1 { color: #ff4b5c; margin-bottom: 10px; }
        p { color: #555; line-height: 1.5; }
        .btn { background: #ff4b5c; color: white; border: none; padding: 15px 25px; border-radius: 50px; font-weight: bold; margin-top: 20px; transition: transform 0.2s; -webkit-appearance: none; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="card">
        <span>🎁</span>
        <h1>¡Sorpresa!</h1>
        <p>Tengo algo especial preparado para ti porque te lo mereces.</p>
        <button class="btn" onclick="alert('ESCRIBE AQUÍ TU REGALO (Ej: Vale por una cena)')">Toca para abrir</button>
    </div>
</body>
</html>
